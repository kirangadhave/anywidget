name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  LintPython:
    name: Python / Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      # Disable jupyter-builder build hook because not needed for linting/formatting, and requires pnpm
      - run: |
          sed -i '' 's/\[tool.hatch.build.hooks.\(.*\)\]/\[_tool.hatch.build.hooks.\1\]/' pyproject.toml
      - uses: astral-sh/setup-uv@v7
      - run: |
          uv run ruff check
          uv run ruff format

  TypecheckPython:
    name: Python / Typecheck
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      # Disable jupyter-builder build hook because not needed for typechecking, and requires pnpm
      - run: |
          sed -i '' 's/\[tool.hatch.build.hooks.\(.*\)\]/\[_tool.hatch.build.hooks.\1\]/' pyproject.toml
      - uses: astral-sh/setup-uv@v7
      - run: uv run ty check

  TestPython:
    name: Python / Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - uses: astral-sh/setup-uv@v7
      - name: Run tests
        run: uv run pytest ./tests --color=yes
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  CheckJavaScript:
    name: JavaScript / Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm check

  TestJavaScript:
    name: JavaScript / Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: |
          pnpm exec playwright install 
          pnpm vitest --run
